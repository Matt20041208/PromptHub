server:
  port: 9103
spring:
  application:
    name: prompt-trade
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/prompt_trade?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: prompt-market
      config:
        server-addr: 127.0.0.1:8848
        namespace: prompt-market
        file-extension: yaml
        import-check:
          enabled: false
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
knife4j:
  enable: true
