server:
  port: 9101

spring:
  application:
    name: prompt-user
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/prompt_user?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: prompt-market
      config:
        server-addr: 127.0.0.1:8848
        namespace: prompt-market
        file-extension: yaml
        import-check:
          enabled: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: prompt-market-secret-key-min-length-256-bits-for-hs256
  expiration: 604800000

knife4j:
  enable: true
  setting:
    enable-swagger-models: true
