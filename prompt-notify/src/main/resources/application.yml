server:
  port: 9106

spring:
  application:
    name: prompt-notify
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/prompt_notify?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: prompt-market
      config:
        server-addr: 127.0.0.1:8848
        namespace: prompt-market
        file-extension: yaml
        import-check:
          enabled: false
  mail:
    host: smtp.example.com
    port: 587
    username: notify@example.com
    password: default-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

knife4j:
  enable: true
  setting:
    enable-swagger-models: true

notify:
  email:
    enabled: false
